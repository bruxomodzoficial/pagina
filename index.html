<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#0a0a0a,#000);
color:white;
}

/* container */

.container{
width:90%;
max-width:420px;
text-align:center;
background:#0f0f0f;
border-radius:18px;
padding:25px;
box-shadow:0 0 30px rgba(0,0,0,0.9);
border:1px solid #222;
}

/* logo */

.logo{
width:100px;
height:100px;
border-radius:50%;
border:3px solid red;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:40px;
color:red;
margin-bottom:15px;
box-shadow:0 0 20px red;
}

.logo i{
font-size:45px;
}

/* titulo */

h1{
font-size:30px;
letter-spacing:3px;
margin-bottom:5px;
color:#ff0000;
text-shadow:0 0 10px red;
}

.user{
color:#aaa;
margin-bottom:25px;
}

/* links */

.links{
display:flex;
flex-direction:column;
gap:14px;
}

.link{
background:#141414;
padding:18px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
transition:0.3s;
text-decoration:none;
color:white;
border:1px solid #222;
}

.link:hover{
transform:scale(1.05);
background:#1f1f1f;
border:1px solid red;
box-shadow:0 0 15px red;
}

.link span{
font-size:13px;
color:#bbb;
}

.icon{
font-size:22px;
width:35px;
text-align:center;
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.footer{
margin-top:30px;
font-size:12px;
color:#777;
}

.footer span{
color:red;
}

/* BOTÃO FLUTUANTE PROFISSIONAL */

.float-container{
position:fixed;
bottom:25px;
right:25px;
display:flex;
flex-direction:column;
align-items:flex-end;
gap:12px;
z-index:999;
}

.float-menu{
display:none;
flex-direction:column;
gap:10px;
animation:menuOpen .3s ease;
}

@keyframes menuOpen{
from{
opacity:0;
transform:translateY(20px) scale(.9);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

.float-item{
display:flex;
align-items:center;
gap:10px;
padding:10px 14px;
border-radius:12px;
color:white;
text-decoration:none;
font-size:14px;
background:#111;
border:1px solid #333;
transition:.3s;
}

.float-item:hover{
transform:scale(1.05);
box-shadow:0 0 10px #000;
}

/* telegram */

.telegram{
background:#0088cc;
}

/* instagram */

.instagram{
background:linear-gradient(45deg,#ff0066,#ff9900,#cc00ff);
}

/* botão principal */

.float-btn{
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(45deg,#ff0000,#990000);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 0 20px red;
transition:.3s;
}

.float-btn:hover{
transform:rotate(90deg) scale(1.1);
}

</style>
